services:
  - type: web
    name: agenda-cloud-contactos
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agenda-cloud-db
          property: connectionString

databases:
  - name: agenda-cloud-db
    plan: free
    databaseName: contactos_db
    user: contactos_user